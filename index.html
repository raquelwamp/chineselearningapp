<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="汉字">
<meta name="theme-color" content="#FF6B35">
<title>汉字 · Aprende Chino</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --orange:#FF6B35; --orange2:#FF8C5A; --orange-light:#FFF0EB;
  --teal:#00BFA5; --teal-light:#E0F7F5;
  --navy:#1A1A2E; --navy2:#2D2D44;
  --cream:#FFF8F5; --cream2:#FFF3EE;
  --ink:#2C2C3E; --ink2:#5C5C70; --ink3:#9B9BAD;
  --white:#FFFFFF;
  --border:#EDE8E3;
  --green:#38C172; --green-light:#EDFAF3;
  --red:#E53E3E; --red-light:#FFF5F5;
  --gold:#F6C90E; --gold-light:#FFFBE6;
  --r:16px; --r-sm:10px; --r-lg:24px; --r-xl:32px;
  --shadow:0 4px 20px rgba(26,26,46,.08);
  --shadow-lg:0 8px 40px rgba(26,26,46,.14);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;flex-direction:column}
.cn{font-family:'Noto Sans SC',sans-serif}

/* ── BOTTOM NAV ── */
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--border);display:flex;z-index:200;padding-bottom:env(safe-area-inset-bottom)}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 0;border:none;background:none;cursor:pointer;font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;color:var(--ink3);letter-spacing:.03em;text-transform:uppercase;transition:color .15s}
.bnav-btn .bicon{font-size:22px;line-height:1;transition:transform .15s}
.bnav-btn.active{color:var(--orange)}
.bnav-btn.active .bicon{transform:scale(1.1)}

/* ── SCREENS ── */
.screen{display:none;flex:1;flex-direction:column;padding-bottom:72px;overflow-y:auto}
.screen.active{display:flex}
#game-screen{padding-bottom:0}

/* ── HOME ── */
.home-hero{background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);padding:28px 20px 24px;position:relative;overflow:hidden}
.home-hero::before{content:'';position:absolute;top:-40px;right:-40px;width:180px;height:180px;background:var(--orange);opacity:.12;border-radius:50%}
.home-hero::after{content:'';position:absolute;bottom:-30px;left:20px;width:100px;height:100px;background:var(--teal);opacity:.1;border-radius:50%}
.hero-greeting{font-size:13px;font-weight:600;color:rgba(255,255,255,.5);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.hero-title{font-size:26px;font-weight:800;color:var(--white);margin-bottom:2px}
.hero-title span{color:var(--orange2)}
.hero-sub{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:16px}
.hero-stats{display:flex;gap:10px}
.hstat{background:rgba(255,255,255,.1);border-radius:var(--r-sm);padding:8px 14px;text-align:center;backdrop-filter:blur(4px)}
.hstat-num{font-size:18px;font-weight:800;color:var(--white)}
.hstat-lbl{font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}

/* ── FILTER BAR ── */
.filter-section{padding:16px 20px 0;background:var(--white);border-bottom:1px solid var(--border)}
.filter-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.pill{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--white);font-family:'Nunito',sans-serif;font-size:12.5px;font-weight:700;color:var(--ink2);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.pill:hover{border-color:var(--orange);color:var(--orange)}
.pill.on{background:var(--orange);border-color:var(--orange);color:var(--white)}
.pill.on-teal{background:var(--teal);border-color:var(--teal);color:var(--white)}
.filter-label{font-size:10px;font-weight:800;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}

/* ── GAME CARDS ── */
.section-pad{padding:20px}
.section-title{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:14px}
.games-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.gcard{background:var(--white);border-radius:var(--r-lg);padding:18px 16px;cursor:pointer;box-shadow:var(--shadow);transition:transform .18s,box-shadow .18s;border:none;text-align:left;position:relative;overflow:hidden}
.gcard::after{content:'';position:absolute;inset:0;border-radius:inherit;opacity:0;background:currentColor;transition:opacity .15s}
.gcard:active{transform:scale(.97)}
.gcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
.gcard-icon{font-size:32px;margin-bottom:10px;display:block}
.gcard-title{font-size:14px;font-weight:800;color:var(--ink);margin-bottom:3px}
.gcard-desc{font-size:11px;color:var(--ink3);line-height:1.4}
.gcard-stripe{position:absolute;top:0;left:0;right:0;height:4px;border-radius:var(--r-lg) var(--r-lg) 0 0}
.gcard-count{position:absolute;top:12px;right:12px;font-size:10px;font-weight:800;color:var(--ink3);background:var(--cream);border-radius:10px;padding:2px 7px}

/* ── VOCAB SCREEN ── */
.screen-header{background:var(--white);padding:18px 20px 14px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.screen-header h2{font-size:20px;font-weight:800;margin-bottom:10px}
.search-row{display:flex;gap:8px}
.search-inp{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Nunito',sans-serif;font-size:14px;color:var(--ink);background:var(--cream);outline:none;transition:border-color .15s}
.search-inp:focus{border-color:var(--orange);background:var(--white)}
.btn{padding:9px 16px;border-radius:var(--r-sm);border:none;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
.btn-primary{background:var(--orange);color:var(--white)}
.btn-primary:hover{background:var(--orange2)}
.btn-outline{background:var(--white);color:var(--ink2);border:1.5px solid var(--border)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-ghost{background:none;border:none;color:var(--ink3);padding:6px 8px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:13px}

/* vocab table */
.vtable-wrap{background:var(--white);margin:8px 10px;border-radius:var(--r);box-shadow:var(--shadow);overflow-x:auto;-webkit-overflow-scrolling:touch}
.vtable{width:100%;border-collapse:collapse;min-width:320px}
.vtable th{background:var(--cream);padding:9px 14px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);text-align:left;border-bottom:1px solid var(--border)}
.vtable td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.vtable tr:last-child td{border-bottom:none}
.vtable tr:hover td{background:var(--cream2)}
.cn-cell{font-family:'Noto Sans SC',sans-serif;font-size:19px;font-weight:500}
.py-cell{font-size:12px;color:var(--orange);font-weight:600}
.hsk-tag{display:inline-block;padding:2px 7px;border-radius:8px;font-size:10px;font-weight:800}
.hsk1{background:#FFF0EB;color:#D4481A}.hsk2{background:#FFF8E6;color:#B07800}.hsk3{background:#E8F4FD;color:#1565C0}
.cat-tag{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;background:var(--cream);color:var(--ink2)}
.act-btn{background:none;border:none;cursor:pointer;padding:4px 6px;border-radius:6px;font-size:14px;transition:background .15s}
.act-btn:hover{background:var(--cream)}
.pagination{display:flex;align-items:center;justify-content:center;gap:12px;padding:14px;font-size:12px;font-weight:600;color:var(--ink3)}
.pagination button{background:var(--white);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:6px 12px;cursor:pointer;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;color:var(--ink2);transition:all .15s}
.pagination button:hover{border-color:var(--orange);color:var(--orange)}

/* ── GRAMMAR SCREEN ── */
.grammar-card{background:var(--white);border-radius:var(--r);margin:0 16px 12px;box-shadow:var(--shadow);overflow:hidden}
.gc-header{padding:16px 18px 12px;border-left:4px solid var(--orange)}
.gc-pattern{font-family:'Noto Sans SC',sans-serif;font-size:20px;font-weight:700;color:var(--orange);margin-bottom:4px}
.gc-name{font-size:15px;font-weight:800;margin-bottom:4px}
.gc-desc{font-size:13px;color:var(--ink2);line-height:1.6}
.gc-examples{background:var(--cream);padding:12px 18px;display:flex;flex-direction:column;gap:8px}
.gc-ex{background:var(--white);border-radius:var(--r-sm);padding:10px 14px}
.gc-cn{font-family:'Noto Sans SC',sans-serif;font-size:16px}
.gc-py{font-size:12px;color:var(--orange);font-weight:600;margin-top:2px}
.gc-es{font-size:12px;color:var(--ink3);margin-top:1px}
.grammar-practice-btn{display:block;margin:0 16px 20px;background:var(--orange);color:var(--white);border:none;border-radius:var(--r);padding:14px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;text-align:center;width:calc(100% - 32px)}

/* ── GAME SCREEN ── */
#game-screen{background:var(--cream);min-height:100vh}
.game-topbar{background:var(--white);padding:14px 16px 12px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.back-btn{background:var(--cream);border:none;border-radius:var(--r-sm);padding:8px 12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:var(--ink2);cursor:pointer;display:flex;align-items:center;gap:5px;transition:background .15s}
.back-btn:hover{background:var(--border)}
.game-topbar-title{flex:1;font-size:16px;font-weight:800}
.game-topbar-sub{font-size:11px;color:var(--ink3);font-weight:600}
.game-body{padding:16px;max-width:480px;margin:0 auto;width:100%;padding-bottom:32px}

/* progress */
.progress-track{height:6px;background:var(--border);border-radius:3px;margin-bottom:16px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--orange),var(--orange2));border-radius:3px;transition:width .4s ease}

/* scores */
.scores{display:flex;gap:10px;margin-bottom:16px}
.score-box{flex:1;background:var(--white);border-radius:var(--r);padding:10px;text-align:center;box-shadow:var(--shadow)}
.score-n{font-size:22px;font-weight:800;color:var(--orange)}
.score-l{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.05em;margin-top:1px}

/* mode chips in game */
.mode-chips{display:flex;gap:7px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.mode-chips::-webkit-scrollbar{display:none}

/* ── FLASHCARD ── */
.fc-perspective{perspective:1000px;cursor:pointer;margin-bottom:16px}
.fc-card{width:100%;aspect-ratio:5/3;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1)}
.fc-card.flipped{transform:rotateY(180deg)}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r-xl);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:28px}
.fc-front{background:var(--white);box-shadow:var(--shadow-lg)}
.fc-back{background:linear-gradient(135deg,var(--orange),var(--orange2));transform:rotateY(180deg);box-shadow:var(--shadow-lg)}
.fc-emoji{font-size:36px;margin-bottom:4px}
.fc-char{font-family:'Noto Sans SC',sans-serif;font-size:56px;font-weight:700;color:var(--ink);line-height:1}
.fc-py{font-size:18px;font-weight:700;color:var(--orange)}
.fc-hint{font-size:11px;color:var(--ink3);font-weight:600;margin-top:4px}
.fc-back .fc-char{color:rgba(255,255,255,.9);font-size:36px}
.fc-back .fc-py{color:rgba(255,255,255,.7);font-size:15px}
.fc-meaning{font-size:24px;font-weight:800;color:var(--white)}
.fc-btns{display:flex;gap:10px}
.fc-btn{flex:1;padding:14px;border-radius:var(--r);border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all .15s}
.fc-no{background:var(--red-light);color:var(--red)}
.fc-yes{background:var(--green-light);color:var(--green)}
.fc-no:hover{background:var(--red);color:var(--white)}
.fc-yes:hover{background:var(--green);color:var(--white)}

/* ── MULTIPLE CHOICE ── */
.mc-qbox{background:var(--white);border-radius:var(--r-xl);padding:36px 24px;text-align:center;margin-bottom:14px;box-shadow:var(--shadow-lg)}
.mc-emoji{font-size:42px;margin-bottom:8px}
.mc-char{font-family:'Noto Sans SC',sans-serif;font-size:64px;font-weight:700;line-height:1;color:var(--ink)}
.mc-py{font-size:18px;font-weight:700;color:var(--orange);margin-top:6px}
.mc-instr{font-size:12px;color:var(--ink3);font-weight:600;margin-top:6px;text-transform:uppercase;letter-spacing:.05em}
.mc-opts{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mc-opt{padding:16px 10px;border-radius:var(--r);border:2px solid var(--border);background:var(--white);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;min-height:70px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:var(--shadow)}
.mc-opt:hover{border-color:var(--orange)}
.mc-opt.ok{background:var(--green-light);border-color:var(--green);color:var(--green)}
.mc-opt.no{background:var(--red-light);border-color:var(--red);color:var(--red)}
.mc-opt-emoji{font-size:22px}
.mc-opt-txt{font-size:13px}

/* ── MATCHING ── */
.match-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.match-item{padding:12px 8px;border-radius:var(--r);border:2px solid var(--border);background:var(--white);cursor:pointer;text-align:center;font-size:13px;font-weight:700;min-height:52px;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);transition:all .15s}
.match-item.cn{font-family:'Noto Sans SC',sans-serif;font-size:20px}
.match-item.py{font-size:12px;color:var(--orange);font-weight:700}
.match-item.sel{border-color:var(--gold);background:var(--gold-light)}
.match-item.done{border-color:var(--green);background:var(--green-light);opacity:.65;pointer-events:none}
.match-item.bad{border-color:var(--red);background:var(--red-light);animation:shake .3s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* ── MEMORY ── */
.mem-grid{display:grid;gap:8px}
.mem-card{aspect-ratio:1;cursor:pointer}
.mem-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .4s}
.mem-card.flip .mem-inner,.mem-card.done .mem-inner{transform:rotateY(180deg)}
.mem-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--r);display:flex;align-items:center;justify-content:center;border:2px solid var(--border);padding:6px;text-align:center}
.mem-b{background:var(--navy);border-color:var(--navy)}
.mem-b-icon{font-family:'Noto Sans SC',sans-serif;font-size:20px;color:rgba(255,255,255,.2);font-weight:700}
.mem-f{background:var(--white);transform:rotateY(180deg);font-family:'Noto Sans SC',sans-serif;font-size:16px;font-weight:600}
.mem-f.es{font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:var(--ink2)}
.mem-card.done .mem-f{background:var(--green-light);border-color:var(--green)}

/* ── WRITING ── */
.wr-qbox{background:var(--white);border-radius:var(--r-xl);padding:28px 20px;text-align:center;margin-bottom:14px;box-shadow:var(--shadow-lg)}
.wr-qlabel{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:10px}
.wr-main{font-size:28px;font-weight:800;margin-bottom:6px}
.wr-py{font-size:17px;font-weight:700;color:var(--orange);margin-top:4px}
.wr-inputrow{display:flex;gap:10px;margin-bottom:10px}
.wr-inp{flex:1;padding:14px 16px;border:2px solid var(--border);border-radius:var(--r);font-family:'Noto Sans SC',sans-serif;font-size:24px;color:var(--ink);background:var(--white);outline:none;text-align:center;transition:border-color .15s;letter-spacing:2px}
.wr-inp:focus{border-color:var(--orange)}
.wr-inp.ok{border-color:var(--green);background:var(--green-light);color:var(--green)}
.wr-inp.no{border-color:var(--red);background:var(--red-light);color:var(--red);animation:shake .3s}
.wr-feedback{border-radius:var(--r);padding:12px 16px;font-size:13px;font-weight:700;margin-top:10px;display:none}
.wr-feedback.show{display:block}
.wr-fb-ok{background:var(--green-light);color:var(--green)}
.wr-fb-no{background:var(--red-light);color:var(--red)}
.pista-box{background:var(--white);border:2px solid var(--border);border-radius:var(--r);padding:14px;text-align:center;margin-top:8px;display:none}
.pista-char{font-family:'Noto Sans SC',sans-serif;font-size:48px;color:var(--ink3);opacity:.3}
.pista-py{font-size:13px;font-weight:600;color:var(--orange);opacity:.5;margin-top:4px}

/* ── GRAMMAR QUIZ ── */
.gr-qbox{background:var(--white);border-radius:var(--r-xl);padding:28px 20px;text-align:center;margin-bottom:14px;box-shadow:var(--shadow-lg)}
.gr-sentence{font-family:'Noto Sans SC',sans-serif;font-size:26px;font-weight:600;line-height:1.5;margin-bottom:6px}
.gr-hint{font-size:12px;color:var(--ink3);font-weight:600}
.gr-opts{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-bottom:12px}
.gr-opt{padding:11px 20px;border-radius:24px;border:2px solid var(--border);background:var(--white);font-family:'Noto Sans SC',sans-serif;font-size:17px;cursor:pointer;transition:all .15s;box-shadow:var(--shadow)}
.gr-opt:hover{border-color:var(--orange)}
.gr-opt.ok{background:var(--green-light);border-color:var(--green);color:var(--green)}
.gr-opt.no{background:var(--red-light);border-color:var(--red);color:var(--red)}
.gr-explain{background:var(--cream);border-radius:var(--r);padding:14px 16px;font-size:13px;line-height:1.6;color:var(--ink2);display:none;margin-bottom:12px}
.gr-explain.show{display:block}
.gr-more-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.gr-chip{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:4px 10px;font-size:12px;display:inline-flex;align-items:center;gap:4px}

/* ── CLASSIFIER GAME ── */
.cl-qbox{background:var(--white);border-radius:var(--r-xl);padding:28px 20px;text-align:center;margin-bottom:14px;box-shadow:var(--shadow-lg)}
.cl-qlabel{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:10px}
.cl-sentence{font-family:'Noto Sans SC',sans-serif;font-size:28px;font-weight:600;line-height:1.5;margin-bottom:4px}
.cl-py{font-size:14px;color:var(--orange);font-weight:600;margin-bottom:2px}
.cl-es{font-size:13px;color:var(--ink3)}
.cl-opts{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-bottom:12px}
.cl-opt{padding:12px 16px;border-radius:var(--r);border:2px solid var(--border);background:var(--white);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:80px;box-shadow:var(--shadow);transition:all .15s}
.cl-opt:hover{border-color:var(--orange)}
.cl-opt.ok{background:var(--green-light);border-color:var(--green)}
.cl-opt.no{background:var(--red-light);border-color:var(--red)}
.cl-opt-char{font-family:'Noto Sans SC',sans-serif;font-size:26px;font-weight:700;color:var(--ink)}
.cl-opt-py{font-size:11px;color:var(--orange);font-weight:600}
.cl-opt-desc{font-size:10px;color:var(--ink3);font-weight:600;text-align:center;max-width:80px;line-height:1.3}
.cl-explain{background:var(--cream);border-radius:var(--r);padding:14px 16px;font-size:13px;line-height:1.6;color:var(--ink2);display:none;margin-bottom:12px}
.cl-explain.show{display:block}

/* classifier reference */
.clf-card{background:var(--white);border-radius:var(--r);margin:0 16px 12px;box-shadow:var(--shadow);overflow:hidden}
.clf-header{display:flex;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid var(--border)}
.clf-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-family:'Noto Sans SC',sans-serif;font-size:26px;font-weight:700;flex-shrink:0}
.clf-char{font-size:16px;font-weight:800}
.clf-py{font-size:12px;color:var(--orange);font-weight:600}
.clf-rule{font-size:12px;color:var(--ink2);margin-top:2px;line-height:1.5}
.clf-nouns{padding:12px 18px;display:flex;flex-wrap:wrap;gap:8px}
.clf-noun{display:inline-flex;align-items:center;gap:5px;border-radius:12px;padding:7px 12px;font-size:12px}
.clf-noun-emoji{font-size:18px}
.clf-noun-cn{font-family:'Noto Sans SC',sans-serif;font-size:15px;font-weight:600}
.clf-noun-es{color:var(--ink3);font-size:11px}

/* build mode */
.build-box{background:var(--white);border-radius:var(--r-xl);padding:22px 18px;text-align:center;margin-bottom:14px;box-shadow:var(--shadow-lg)}
.build-target{font-size:17px;font-weight:700;margin-bottom:14px;color:var(--ink)}
.drop-zone{min-height:56px;border:2px dashed var(--border);border-radius:var(--r);padding:10px;display:flex;flex-wrap:wrap;gap:7px;justify-content:center;align-items:center;margin-bottom:14px;transition:border-color .2s}
.drop-zone.has-items{border-style:solid;border-color:var(--orange)}
.drop-hint{font-size:12px;color:var(--ink3);font-weight:600}
.piece-zone{display:flex;flex-wrap:wrap;gap:7px;justify-content:center}
.piece{background:var(--cream);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:9px 14px;font-family:'Noto Sans SC',sans-serif;font-size:17px;cursor:pointer;transition:all .15s;font-weight:500}
.piece:hover{border-color:var(--orange);background:var(--orange-light)}
.piece.used{opacity:.3;pointer-events:none}
.drop-piece{background:var(--white);border:1.5px solid var(--orange);border-radius:var(--r-sm);padding:9px 14px;font-family:'Noto Sans SC',sans-serif;font-size:17px;cursor:pointer;transition:background .15s;font-weight:500}
.drop-piece:hover{background:var(--orange-light)}

/* ── RESULTS ── */
.results-box{background:var(--white);border-radius:var(--r-xl);padding:40px 24px;text-align:center;box-shadow:var(--shadow-lg);margin-top:10px}
.results-emoji{font-size:56px;margin-bottom:10px}
.results-title{font-size:24px;font-weight:800;margin-bottom:4px}
.results-sub{font-size:14px;color:var(--ink3);margin-bottom:24px}
.results-stats{display:flex;gap:16px;justify-content:center;margin-bottom:28px}
.res-stat-n{font-size:36px;font-weight:800;color:var(--orange)}
.res-stat-l{font-size:12px;color:var(--ink3);font-weight:700}
.results-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}

/* ── MODAL ── */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(26,26,46,.5);z-index:300;align-items:flex-end;justify-content:center;padding:0}
.modal-bg.open{display:flex}
.modal{background:var(--white);border-radius:var(--r-xl) var(--r-xl) 0 0;padding:24px 20px 32px;width:100%;max-width:480px}
.modal h3{font-size:18px;font-weight:800;margin-bottom:18px}
.form-group{margin-bottom:14px}
.form-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--ink3);display:block;margin-bottom:5px}
.form-inp,.form-sel{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:'Nunito',sans-serif;font-size:14px;color:var(--ink);background:var(--cream);outline:none;transition:border-color .15s}
.form-inp:focus,.form-sel:focus{border-color:var(--orange);background:var(--white)}
.modal-footer{display:flex;gap:10px;margin-top:20px}

/* ── NEXT BTN ── */
.next-btn{display:none;width:100%;padding:14px;background:var(--navy);color:var(--white);border:none;border-radius:var(--r);font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;margin-top:10px;transition:background .15s}
.next-btn.show{display:block}
.next-btn:hover{background:var(--navy2)}

/* ── UTILITY ── */
.hidden{display:none!important}
.mb8{margin-bottom:8px}
.mb14{margin-bottom:14px}
.mt10{margin-top:10px}
.center{text-align:center}

/* ── RESPONSIVE ── */
@media(max-width:390px){
  .games-grid{grid-template-columns:1fr 1fr;gap:9px}
  .gcard{padding:14px 12px}
  .gcard-icon{font-size:26px}
  .gcard-title{font-size:13px}
  .gcard-desc{font-size:10px}
  .mc-char{font-size:50px}
  .fc-char{font-size:44px}
  .match-cols{grid-template-columns:1fr 1fr}
  .scores{gap:6px}
  .score-n{font-size:18px}
}

  @media(max-width:420px){
    .vtable th:nth-child(2),.vtable td:nth-child(2){display:none}
    .vtable th:nth-child(4),.vtable td:nth-child(4){display:none}
    .vtable th,.vtable td{padding:7px 7px;font-size:12px}
    .cn-cell{font-size:15px}
    .py-cell{font-size:11px}
    .vtable-wrap{margin:6px 8px;overflow-x:auto}
    .screen-header h2{font-size:17px}
    .search-row{flex-wrap:wrap}
    .search-inp{min-width:0;font-size:13px}
  }
</style>
</head>

// ═══════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════
function shuffle(a) {
  var b = a.slice();
  for (var i = b.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = b[i]; b[i] = b[j]; b[j] = t;
  }
  return b;
}

function el(id) { return document.getElementById(id); }
function html(id, h) { el(id).innerHTML = h; }

function normPy(s) {
  return s.toLowerCase()
    .replace(/[āáǎà]/g,'a').replace(/[ēéěè]/g,'e')
    .replace(/[īíǐì]/g,'i').replace(/[ōóǒò]/g,'o')
    .replace(/[ūúǔù]/g,'u').replace(/[ǖǘǚǜü]/g,'u')
    .replace(/\s+/g,' ').trim();
}

function getFiltered() {
  return vocab.filter(function(w) {
    return (filterLvl === 'all' || w.lvl === filterLvl) &&
           (filterCats.length === 0 || filterCats.indexOf(w.cat) !== -1);
  });
}

function showResults(ok, total, type) {
  var pct = Math.round(ok / total * 100);
  var emoji = pct >= 80 ? '🎉' : pct >= 50 ? '😊' : '💪';
  var msg = pct >= 80 ? '¡Excelente!' : pct >= 50 ? '¡Buen trabajo!' : '¡Sigue practicando!';
  return '<div class="results-box">' +
    '<div class="results-emoji">' + emoji + '</div>' +
    '<div class="results-title">' + msg + '</div>' +
    '<div class="results-sub">Has completado la ronda</div>' +
    '<div class="results-stats">' +
      '<div><div class="res-stat-n" style="color:var(--green)">' + ok + '</div><div class="res-stat-l">Correctas</div></div>' +
      '<div><div class="res-stat-n" style="color:var(--red)">' + (total - ok) + '</div><div class="res-stat-l">Errores</div></div>' +
      '<div><div class="res-stat-n">' + pct + '%</div><div class="res-stat-l">Puntuación</div></div>' +
    '</div>' +
    '<div class="results-btns">' +
      '<button class="btn btn-outline" onclick="exitGame()">← Inicio</button>' +
      '<button class="btn btn-primary" onclick="startGame(\'' + type + '\')">Jugar de nuevo</button>' +
    '</div>' +
  '</div>';
}

function scoreBox(n, l, color) {
  return '<div class="score-box"><div class="score-n" style="color:' + (color || 'var(--orange)') + '">' + n + '</div><div class="score-l">' + l + '</div></div>';
}

// ═══════════════════════════════════════════════════════
function showScreen(name) {
  ['home','vocab','grammar','game'].forEach(function(s) {
    var sc = el('s-' + s);
    sc.classList.toggle('active', s === name);
    sc.style.display = '';
    if (s === name) sc.style.display = 'flex';
    else sc.style.display = 'none';
  });
  ['home','vocab','grammar'].forEach(function(n) {
    var btn = el('nav-' + n);
    if (btn) btn.classList.toggle('active', n === name);
  });
  if (name === 'vocab') renderVocabTable();
  if (name === 'grammar') renderGrammarRef();
}

function exitGame() { showScreen('home'); }

function setLvl(l) { filterLvl = l; initHome(); }
function toggleCat(cat){var i=filterCats.indexOf(cat);if(i===-1)filterCats.push(cat);else filterCats.splice(i,1);initHome();}

function getVocabFiltered() {
  var q = searchQ.toLowerCase();
  return vocab.filter(function(w) {
    return (vocabLvl === 'all' || w.lvl === vocabLvl) &&
           (!q || w.c.includes(searchQ) || w.p.toLowerCase().includes(q) || w.m.toLowerCase().includes(q));
  });
}

function renderVocabTable() {
  var words = getVocabFiltered();
  var total = words.length, pages = Math.ceil(total / PAGE) || 1;
  var page = words.slice(vocabPage * PAGE, (vocabPage + 1) * PAGE);

  var rows = page.map(function(w) {
    var em = E(w.c) ? '<span style="font-size:16px">' + E(w.c) + '</span> ' : '';
    return '<tr>' +
      '<td class="cn-cell">' + em + w.c + '</td>' +
      '<td class="py-cell">' + w.p + '</td>' +
      '<td style="font-size:13px">' + w.m + '</td>' +
      '<td><span class="cat-tag">' + (CAT_EMOJI[w.cat]||'') + '</span></td>' +
      '<td><span class="hsk-tag ' + w.lvl.toLowerCase() + '">' + w.lvl + '</span></td>' +
      '<td><button class="act-btn" onclick="openEdit(' + w.id + ')">✏️</button>' +
          '<button class="act-btn" onclick="delWord(' + w.id + ')">🗑️</button></td>' +
    '</tr>';
  }).join('');
  html('vtbody', rows || '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--ink3)">Sin resultados</td></tr>');

  html('vpag', '<button onclick="vprev()">‹</button> Pág ' + (vocabPage+1) + '/' + pages + ' (' + total + ') <button onclick="vnext(' + (pages-1) + ')">›</button>');

  // vocab level filter
  var lvls = ['all','HSK1','HSK2','HSK3'];
  var lls = ['Todos','HSK 1','HSK 2','HSK 3'];
  html('vocab-lvl-filter', lvls.map(function(l,i){
    return '<button class="pill btn-sm' + (l===vocabLvl?' on':'') + '" onclick="setVocabLvl(\'' + l + '\')">' + lls[i] + '</button>';
  }).join(''));
}

function filterVocab() { searchQ = el('search-inp').value; vocabPage = 0; renderVocabTable(); }
function setVocabLvl(l) { vocabLvl = l; vocabPage = 0; renderVocabTable(); }
function vprev() { if (vocabPage > 0) { vocabPage--; renderVocabTable(); } }
function vnext(max) { if (vocabPage < max) { vocabPage++; renderVocabTable(); } }

function openAddModal() {
  editId = null;
  el('modal-h').textContent = 'Añadir palabra';
  el('m-char').value = ''; el('m-py').value = ''; el('m-mean').value = '';
  el('m-lvl').value = 'HSK2';
  html('m-cat', CATS.map(function(c){return '<option>' + c + '</option>';}).join(''));
  el('modal-bg').classList.add('open');
}
function openEdit(id) {
  var w = vocab.find(function(x){return x.id===id;});
  if (!w) return;
  editId = id;
  el('modal-h').textContent = 'Editar palabra';
  el('m-char').value = w.c; el('m-py').value = w.p; el('m-mean').value = w.m;
  el('m-lvl').value = w.lvl;
  html('m-cat', CATS.map(function(c){return '<option' + (c===w.cat?' selected':'') + '>' + c + '</option>';}).join(''));
  el('modal-bg').classList.add('open');
}
function closeModal() { el('modal-bg').classList.remove('open'); }
function saveWord() {
  var c = el('m-char').value.trim(), p = el('m-py').value.trim();
  var m = el('m-mean').value.trim(), cat = el('m-cat').value, lvl = el('m-lvl').value;
  if (!c || !p || !m) { alert('Rellena todos los campos.'); return; }
  if (editId) {
    var w = vocab.find(function(x){return x.id===editId;});
    if (w) { w.c=c; w.p=p; w.m=m; w.cat=cat; w.lvl=lvl; }
  } else {
    vocab.push({id:nextId++,c:c,p:p,m:m,cat:cat,lvl:lvl});
  }
  closeModal(); renderVocabTable(); initHome();
}
function delWord(id) {
  if (!confirm('¿Eliminar?')) return;
  vocab = vocab.filter(function(x){return x.id!==id;});
  renderVocabTable(); initHome();
}

// START GAME
// ═══════════════════════════════════════════════════════
function startGame(type) {
  var words = getFiltered();
  if (type !== 'grammar' && type !== 'classifier' && words.length < 4) {
    alert('Necesitas al menos 4 palabras. Cambia el filtro.'); return;
  }
  showScreen('game');
  el('game-body').innerHTML = '';
  var icons = {flashcard:'🃏',multiple:'🔘',matching:'🔗',memory:'🧩',writing:'✍️',grammar:'📝',classifier:'🔢'};
  var titles = {flashcard:'Flashcards',multiple:'Opción múltiple',matching:'Emparejamiento',memory:'Memoria',writing:'Escribe el carácter',grammar:'Quiz de gramática',classifier:'Clasificadores 量词'};
  el('g-title').textContent = (icons[type]||'') + ' ' + (titles[type]||type);
  el('g-sub').textContent = type !== 'grammar' && type !== 'classifier' ? words.length + ' palabras seleccionadas' : '';
  if (type === 'flashcard') initFlashcard(words);
  else if (type === 'multiple') initMultiple(words);
  else if (type === 'matching') initMatching(words);
  else if (type === 'memory') initMemory(words);
  else if (type === 'writing') initWriting(words);
  else if (type === 'grammar') initGrammar();
  else if (type === 'classifier') initClassifier();
}

// ═══════════════════════════════════════════════════════
// FLASHCARD
// ═══════════════════════════════════════════════════════
function initFlashcard(words) {
  fcQueue = shuffle(words); fcReview = [];
  gOk = 0; gBad = 0; fcFlipped = false;
  renderFC();
}

function renderFC() {
  if (fcQueue.length === 0 && fcReview.length === 0) {
    html('game-body', renderScores(gOk,gBad,'left') + showResults(gOk, gOk+gBad, 'flashcard'));
    return;
  }
  if (fcQueue.length === 0) { fcQueue = shuffle(fcReview); fcReview = []; }
  var w = fcQueue[0];
  var total = gOk + gBad + fcQueue.length;
  var pct = total ? Math.round((gOk+gBad)/total*100) : 0;
  var reverse = Math.random() > 0.5;
  var frontChar = reverse ? w.m : w.c;
  var frontPy = reverse ? '' : w.p;
  var frontEm = reverse ? (E(w.c)||'') : (E(w.c)||'');
  var backMean = reverse ? w.c : w.m;
  var backPy = reverse ? w.p : '';
  var backEm = E(w.c) || '';

  var h = renderScores(gOk, gBad, 'left') +
    '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="fc-perspective" onclick="flipFC()">' +
      '<div class="fc-card" id="fc-card">' +
        '<div class="fc-face fc-front">' +
          '<div class="fc-char cn" style="font-size:' + (reverse?'28px':'52px') + '">' + frontChar + '</div>' +
          (frontPy ? '<div class="fc-py">' + frontPy + '</div>' : '') +
          '<div class="fc-hint">Toca para voltear</div>' +
        '</div>' +
        '<div class="fc-face fc-back">' +
          '<div class="fc-emoji">' + backEm + '</div>' +
          '<div class="fc-meaning">' + backMean + '</div>' +
          (backPy ? '<div class="fc-py" style="color:rgba(255,255,255,.75)">' + backPy + '</div>' : '') +
          '<div class="fc-char cn" style="font-size:24px;color:rgba(255,255,255,.6)">' + (reverse ? w.c : '') + '</div>' +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div id="fc-btns" style="display:none">' +
      '<div class="fc-btns">' +
        '<button class="fc-btn fc-no" onclick="fcAns(false)">😅 Repasar</button>' +
        '<button class="fc-btn fc-yes" onclick="fcAns(true)">✅ Lo sé</button>' +
      '</div>' +
    '</div>';
  el('game-body').innerHTML = h;
  fcFlipped = false;
}

function flipFC() {
  if (fcFlipped) return;
  var card = el('fc-card'); if (!card) return;
  card.style.transform = 'rotateY(180deg)';
  el('fc-btns').style.display = '';
  fcFlipped = true;
}

function fcAns(ok) {
  var w = fcQueue.shift();
  if (ok) gOk++; else { gBad++; fcReview.push(w); }
  renderFC();
}

function renderScores(ok, bad, align) {
  return '<div class="scores">' +
    scoreBox(ok, 'Correctas', 'var(--green)') +
    scoreBox(bad, 'Repasar', 'var(--red)') +
    scoreBox(fcQueue ? fcQueue.length : 0, 'Quedan') +
  '</div>';
}

// ═══════════════════════════════════════════════════════
// MULTIPLE CHOICE
// ═══════════════════════════════════════════════════════
function initMultiple(words) {
  gWords = shuffle(words); gIdx = 0; gOk = 0; gBad = 0;
  renderMC();
}

function renderMC() {
  if (gIdx >= Math.min(gWords.length, 20)) {
    el('game-body').innerHTML = renderMCScores() + showResults(gOk, Math.min(gWords.length,20), 'multiple');
    return;
  }
  var w = gWords[gIdx];
  var reverse = Math.random() > 0.5;
  var others = shuffle(gWords.filter(function(_,i){return i!==gIdx;})).slice(0,3);
  var opts = shuffle([w].concat(others));
  var pct = Math.round(gIdx / Math.min(gWords.length,20) * 100);
  var em = E(w.c) || '';

  var optsH = opts.map(function(opt) {
    var label;
    if (reverse) { label = opt.c; }
    else { label = opt.m; }
    return '<button class="mc-opt" onclick="mcAns(\'' + opt.id + '\',\'' + w.id + '\')">' +
      '<div class="mc-opt-txt cn" style="font-size:' + (reverse?'18px':'13px') + '">' + label + '</div>' +
    '</button>';
  }).join('');

  el('game-body').innerHTML =
    renderMCScores() +
    '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="mc-qbox">' +
      '<div class="mc-char cn" style="font-size:' + (reverse?'18px':'60px') + '">' + (reverse ? w.m : w.c) + '</div>' +
      (!reverse ? '<div class="mc-py">' + w.p + '</div>' : '') +
      '<div class="mc-instr">' + (reverse ? 'Elige el carácter' : 'Elige el significado') + '</div>' +
    '</div>' +
    '<div class="mc-opts" id="mc-opts">' + optsH + '</div>';
}

function renderMCScores() {
  return '<div class="scores">' +
    scoreBox(gOk,'Correctas','var(--green)') +
    scoreBox(gBad,'Errores','var(--red)') +
    scoreBox(gIdx+1,'Pregunta') +
  '</div>';
}

function mcAns(selId, okId) {
  var ok = selId === okId;
  var w = gWords[gIdx];
  document.querySelectorAll('.mc-opt').forEach(function(b) { b.onclick = null; });
  document.querySelectorAll('.mc-opt').forEach(function(b) {
    var txt = b.querySelector('.mc-opt-txt');
    if (!txt) return;
    var isOk = (txt.textContent.trim() === w.m || txt.textContent.trim() === w.c);
    if (ok && b === event.currentTarget) b.classList.add('ok');
    else if (!ok && b === event.currentTarget) b.classList.add('no');
    if (isOk) b.classList.add('ok');
  });
  if (ok) gOk++; else gBad++;
  gIdx++;
  setTimeout(renderMC, ok ? 600 : 1100);
}

// ═══════════════════════════════════════════════════════
// MATCHING
// ═══════════════════════════════════════════════════════
function initMatching(words) {
  gWords = shuffle(words); mtMatched = 0; mtRound = 0; mtErrors = 0; mtTotal = 0;
  mtLoadRound();
}

function mtLoadRound() {
  mtRound++;
  var start = (mtRound - 1) * 6;
  mtRoundWords = gWords.slice(start, start + 6);
  if (!mtRoundWords.length) {
    el('game-body').innerHTML =
      '<div class="scores">' + scoreBox(mtTotal,'Parejas','var(--green)') + scoreBox(mtErrors,'Errores','var(--red)') + scoreBox(mtRound-1,'Rondas') + '</div>' +
      showResults(mtTotal, mtTotal + mtErrors, 'matching');
    return;
  }
  mtTotal += mtRoundWords.length;
  mtSel = null;
  var cn = mtRoundWords.map(function(w){return {id:w.id,type:'cn',text:w.c};});
  var py = shuffle(mtRoundWords.map(function(w){return {id:w.id,type:'py',text:w.p};}));
  var es = shuffle(mtRoundWords.map(function(w){
    var em = E(w.c); return {id:w.id,type:'es',text:(em?em+' ':'')+w.m};
  }));
  var all = shuffle(cn.concat(py).concat(es));
  var h = '<div class="scores">' + scoreBox(mtTotal,'Parejas','var(--green)') + scoreBox(mtErrors,'Errores','var(--red)') + scoreBox(mtRound,'Ronda') + '</div>' +
    '<div class="match-cols" id="match-cols">' +
    all.map(function(item) {
      var cls = 'match-item' + (item.type==='cn'?' cn':item.type==='py'?' py':'');
      return '<div class="' + cls + '" data-id="' + item.id + '" data-type="' + item.type + '" onclick="mtClick(this)">' + item.text + '</div>';
    }).join('') +
  '</div>';
  el('game-body').innerHTML = h;
}
function mtClick(div) {
  if (div.classList.contains('done')) return;
  if (!mtSel) { div.classList.add('sel'); mtSel = div; return; }
  if (mtSel === div) { div.classList.remove('sel'); mtSel = null; return; }
  if (mtSel.dataset.id === div.dataset.id && mtSel.dataset.type !== div.dataset.type) {
    mtSel.classList.remove('sel'); mtSel.classList.add('done');
    div.classList.add('done'); mtSel = null;
    var done = document.querySelectorAll('.match-item.done').length;
    if (done === mtRoundWords.length * 3) setTimeout(mtLoadRound, 500);
  } else {
    mtErrors++;
    div.classList.add('bad'); mtSel.classList.add('bad');
    var s = mtSel, d = div;
    setTimeout(function(){ s.classList.remove('sel','bad'); d.classList.remove('bad'); }, 500);
    mtSel = null;
  }
}

// ═══════════════════════════════════════════════════════
// MEMORY
// ═══════════════════════════════════════════════════════
function initMemory(words) {
  var sel = shuffle(words).slice(0, 8);
  memPairs = sel.length; memMatched = 0; memFlips = 0; memFlipped = []; memLocked = false;
  var cards = shuffle(
    sel.map(function(w){return {id:w.id,text:w.c,type:'cn'};}).concat(
    sel.map(function(w){return {id:w.id,text:w.m,type:'es'};}))
  );
  var cols = Math.min(4, Math.ceil(Math.sqrt(cards.length)));
  var h = '<div class="scores">' + scoreBox(memMatched,'Parejas','var(--green)') + scoreBox(memFlips,'Intentos') + '</div>' +
    '<div class="mem-grid" style="grid-template-columns:repeat(' + cols + ',1fr)" id="mem-grid">' +
    cards.map(function(card,i) {
      return '<div class="mem-card" data-i="' + i + '" data-id="' + card.id + '" data-type="' + card.type + '" onclick="memClick(this)">' +
        '<div class="mem-inner">' +
          '<div class="mem-face mem-b"><div class="mem-b-icon">汉</div></div>' +
          '<div class="mem-face mem-f ' + (card.type==='es'?'es':'') + '">' + card.text + '</div>' +
        '</div>' +
      '</div>';
    }).join('') +
  '</div>';
  el('game-body').innerHTML = h;
}

function memClick(div) {
  if (memLocked || div.classList.contains('flip') || div.classList.contains('done')) return;
  div.classList.add('flip');
  memFlipped.push(div);
  if (memFlipped.length === 2) {
    memFlips++;
    el('game-body').querySelector('.scores').innerHTML =
      scoreBox(memMatched,'Parejas','var(--green)') + scoreBox(memFlips,'Intentos');
    memLocked = true;
    var a = memFlipped[0], b = memFlipped[1];
    if (a.dataset.id === b.dataset.id && a.dataset.type !== b.dataset.type) {
      a.classList.add('done'); b.classList.add('done');
      memMatched++;
      el('game-body').querySelector('.scores').innerHTML =
        scoreBox(memMatched,'Parejas','var(--green)') + scoreBox(memFlips,'Intentos');
      memFlipped = []; memLocked = false;
      if (memMatched === memPairs) {
        setTimeout(function(){
          el('game-body').insertAdjacentHTML('beforeend', showResults(memPairs, memPairs, 'memory'));
        }, 400);
      }
    } else {
      setTimeout(function(){
        a.classList.remove('flip'); b.classList.remove('flip');
        memFlipped = []; memLocked = false;
      }, 900);
    }
  }
}

// ═══════════════════════════════════════════════════════
// WRITING
// ═══════════════════════════════════════════════════════
function initWriting(words) {
  gWords = shuffle(words); gIdx = 0; gOk = 0; gBad = 0;
  wrMode = 'char';
  renderWriting();
}

function setWrMode(m) {
  wrMode = m;
  document.querySelectorAll('.mode-chips .pill').forEach(function(b){b.classList.remove('on');});
  var btn = document.getElementById('wr-m-' + m);
  if (btn) btn.classList.add('on');
  if (gIdx > 0) gIdx--;
  renderWriting();
}

function renderWriting() {
  var total = Math.min(gWords.length, 20);
  if (gIdx >= total) {
    el('game-body').innerHTML = showResults(gOk, total, 'writing');
    return;
  }
  var w = gWords[gIdx];
  wrCurMode = wrMode === 'both' ? (Math.random()>.5?'char':'pinyin') : wrMode;
  var pct = Math.round(gIdx/total*100);
  var em = E(w.c) || '';

  var qlabel, mainHtml, pyHtml, inpPh, correct;
  if (wrCurMode === 'char') {
    qlabel = '¿Cómo se escribe este carácter?';
    mainHtml = '<span style="font-size:26px;font-weight:800">' + em + ' ' + w.m + '</span>';
    pyHtml = w.p;
    inpPh = '写汉字…';
    correct = w.c;
  } else {
    qlabel = '¿Cómo se pronuncia?';
    mainHtml = '<span class="cn" style="font-size:52px;font-weight:700">' + em + ' ' + w.c + '</span>';
    pyHtml = w.m;
    inpPh = 'Escribe el pinyin…';
    correct = normPy(w.p);
  }

  var h = '<div class="mode-chips">' +
    ['char','pinyin','both'].map(function(m){
      var labels = {char:'汉字 Carácter',pinyin:'Pinyin',both:'Mixto'};
      return '<button class="pill' + (m===wrMode?' on':'') + '" id="wr-m-' + m + '" onclick="setWrMode(\'' + m + '\')">' + labels[m] + '</button>';
    }).join('') +
  '</div>' +
  '<div class="scores">' + scoreBox(gOk,'Correctas','var(--green)') + scoreBox(gBad,'Errores','var(--red)') + scoreBox(gIdx+1,'Pregunta') + '</div>' +
  '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
  '<div class="wr-qbox">' +
    '<div class="wr-qlabel">' + qlabel + '</div>' +
    '<div class="wr-main">' + mainHtml + '</div>' +
    '<div class="wr-py">' + pyHtml + '</div>' +
  '</div>' +
  '<div class="wr-inputrow">' +
    '<input class="wr-inp" id="wr-inp" placeholder="' + inpPh + '" data-correct="' + correct.replace(/"/g,'&quot;') + '" data-mode="' + wrCurMode + '" onkeydown="if(event.key===\'Enter\')checkWr()">' +
    '<button class="btn btn-primary" onclick="checkWr()">✓</button>' +
  '</div>' +
  '<div style="text-align:center;margin-bottom:10px">' +
    '<button class="btn btn-outline btn-sm" onclick="togglePista()">💡 Ver pista</button>' +
  '</div>' +
  '<div class="pista-box" id="pista-box">' +
    '<div class="pista-py" style="font-size:22px;opacity:.6">' + w.p + '</div>' +
  '</div>' +
  '<div class="wr-feedback" id="wr-fb"></div>' +
  '<button class="next-btn" id="wr-next" onclick="wrNext()">Siguiente →</button>';

  el('game-body').innerHTML = h;
  el('wr-inp').focus();
}

function togglePista() {
  var p = el('pista-box');
  p.style.display = p.style.display === 'block' ? 'none' : 'block';
}

function checkWr() {
  var inp = el('wr-inp'), fb = el('wr-fb');
  if (!inp || !inp.value.trim()) return;
  var mode = inp.dataset.mode, correct = inp.dataset.correct;
  var user = mode === 'char' ? inp.value.trim() : normPy(inp.value.trim());
  var w = gWords[gIdx];
  var ok = user === correct;
  inp.classList.add(ok ? 'ok' : 'no');
  fb.className = 'wr-feedback show ' + (ok ? 'wr-fb-ok' : 'wr-fb-no');
  var em = E(w.c) || '';
  fb.innerHTML = (ok ? '✅ ¡Correcto! ' : '❌ Respuesta: ') +
    em + ' <span class="cn" style="font-size:18px">' + w.c + '</span> ' +
    '<span style="color:var(--orange);font-size:13px">' + w.p + '</span> · ' + w.m;
  if (ok) gOk++; else gBad++;
  gIdx++;
  if (ok) { setTimeout(renderWriting, 1100); }
  else { var nb = el('wr-next'); if(nb) nb.classList.add('show'); }
}

function wrNext() { renderWriting(); }

// ═══════════════════════════════════════════════════════
// GRAMMAR QUIZ
// ═══════════════════════════════════════════════════════
function initGrammar() {
  grQs = shuffle(grammarQs); grIdx = 0; grOk = 0; grBad = 0;
  renderGQ();
}

function renderGQ() {
  if (grIdx >= grQs.length) {
    el('game-body').innerHTML = showResults(grOk, grQs.length, 'grammar');
    return;
  }
  var q = grQs[grIdx];
  var pct = Math.round(grIdx/grQs.length*100);
  var optsH = q.opts.map(function(opt) {
    return '<button class="gr-opt" onclick="grAns(\'' + opt.replace(/'/g,"\\'") + '\',\'' + q.ok.replace(/'/g,"\\'") + '\',\'' + q.exp.replace(/'/g,"\\'") + '\')">' + opt + '</button>';
  }).join('');
  el('game-body').innerHTML =
    '<div class="scores">' + scoreBox(grOk,'Correctas','var(--green)') + scoreBox(grBad,'Errores','var(--red)') + scoreBox(grIdx+1,'Pregunta') + '</div>' +
    '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="gr-qbox">' +
      '<div class="gr-sentence cn">' + q.s.replace('___','<span style="color:var(--orange);font-weight:800">___</span>') + '</div>' +
      '<div class="gr-hint">' + q.hint + '</div>' +
    '</div>' +
    '<div class="gr-opts">' + optsH + '</div>' +
    '<div class="gr-explain" id="gr-exp"></div>' +
    '<button class="next-btn" id="gr-next" onclick="grNext()">Siguiente →</button>';
}

function grAns(sel, ok, exp) {
  document.querySelectorAll('.gr-opt').forEach(function(b){b.onclick=null;});
  var correct = sel === ok;
  document.querySelectorAll('.gr-opt').forEach(function(b) {
    if (b.textContent.trim() === ok) b.classList.add('ok');
    else if (b.textContent.trim() === sel) b.classList.add('no');
  });
  var q2 = grQs[grIdx];
  var expEl = el('gr-exp');
  expEl.className = 'gr-explain show';
  expEl.innerHTML = '💡 ' + exp +
    (q2 && q2.tr ? '<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:13px;color:var(--ink3)"><b>Traducción:</b> ' + q2.tr + '</div>' : '');
  if (correct) grOk++; else grBad++;
  grIdx++;
  if (correct) { setTimeout(renderGQ, 1400); }
  else { var nb = el('gr-next'); if(nb) nb.classList.add('show'); }
}

function grNext() { renderGQ(); }

// ═══════════════════════════════════════════════════════
// CLASSIFIERS
// ═══════════════════════════════════════════════════════
function initClassifier() {
  clMode = 'quiz'; clIdx = 0; clOk = 0; clBad = 0;
  clQs = shuffle(clQsList).slice(0, 20);
  renderCLHeader();
  renderCLQuiz();
}

function renderCLHeader() {
  var modes = ['quiz','ref','build'];
  var labels = ['Quiz','Referencia','Construye'];
  el('g-sub').innerHTML = '<div class="mode-chips" style="margin-top:6px">' +
    modes.map(function(m,i){
      return '<button class="pill btn-sm' + (m===clMode?' on':'') + '" onclick="setCLMode(\'' + m + '\')">' + labels[i] + '</button>';
    }).join('') +
  '</div>';
}

function setCLMode(m) {
  clMode = m;
  renderCLHeader();
  if (m === 'quiz') { clIdx = 0; clOk = 0; clBad = 0; clQs = shuffle(clQsList).slice(0,20); renderCLQuiz(); }
  else if (m === 'ref') renderCLRef();
  else renderCLBuild();
}

function renderCLQuiz() {
  if (clIdx >= clQs.length) {
    el('game-body').innerHTML = showResults(clOk, clQs.length, 'classifier');
    return;
  }
  var q = clQs[clIdx];
  var distractors = shuffle(classifiers.filter(function(c){return c.char!==q.ok;})).slice(0,3);
  var opts = shuffle([q.cl].concat(distractors));
  var pct = Math.round(clIdx/clQs.length*100);
  var optsH = opts.map(function(cl) {
    var safeChar = cl.char.replace(/'/g,"\\'");
    return '<button class="cl-opt" onclick="clAns(\'' + safeChar + '\',\'' + q.ok.replace(/'/g,"\\'") + '\')">' +
      '<div class="cl-opt-char cn">' + cl.char + '</div>' +
      '<div class="cl-opt-py">' + cl.py + '</div>' +
    '</button>';
  }).join('');

  el('game-body').innerHTML =
    '<div class="scores">' + scoreBox(clOk,'Correctas','var(--green)') + scoreBox(clBad,'Errores','var(--red)') + scoreBox(clIdx+1,'Pregunta') + '</div>' +
    '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>' +
    '<div class="cl-qbox">' +
      '<div class="cl-qlabel">¿Qué clasificador (量词) usa este sustantivo?</div>' +
      '<div class="cl-sentence cn">' + q.s + '</div>' +
      '<div class="cl-py">' + q.py + '</div>' +
      '<div class="cl-es">' + q.es + '</div>' +
    '</div>' +
    '<div class="cl-opts">' + optsH + '</div>' +
    '<div class="cl-explain" id="cl-exp"></div>' +
    '<button class="next-btn" id="cl-next" onclick="clNext()">Siguiente →</button>';
}

function clAns(sel, ok) {
  document.querySelectorAll('.cl-opt').forEach(function(b){b.onclick=null;});
  var correct = sel === ok;
  document.querySelectorAll('.cl-opt').forEach(function(b) {
    var ch = b.querySelector('.cl-opt-char');
    if (!ch) return;
    if (ch.textContent === ok) b.classList.add('ok');
    else if (ch.textContent === sel) b.classList.add('no');
  });
  var cl = classifiers.find(function(c){return c.char===ok;});
  var exp = el('cl-exp');
  exp.className = 'cl-explain show';
  exp.innerHTML = '<b>' + ok + ' (' + (cl?cl.py:'') + '):</b> ' + (cl?cl.rule:'') +
    '<br><div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">' +
    (cl?cl.nouns.slice(0,4).map(function(n){
      return '<span style="background:' + cl.bg + ';border:1.5px solid ' + cl.color + '40;border-radius:12px;padding:5px 10px;font-size:12px;display:inline-flex;align-items:center;gap:4px">' +
        '<span style="font-size:18px">' + n.e + '</span>' +
        '<span class="cn" style="font-size:14px;font-weight:600;color:' + cl.color + '">' + n.c + '</span>' +
        '<span style="color:var(--ink3)">' + n.es + '</span></span>';
    }).join(''):'') +
  '</div>';
  if (correct) clOk++; else clBad++;
  clIdx++;
  if (correct) setTimeout(renderCLQuiz, 900);
  else { var nb = el('cl-next'); if(nb) nb.classList.add('show'); }
}

function clNext() { renderCLQuiz(); }

function renderCLRef() {
  el('game-body').innerHTML = classifiers.map(function(cl) {
    return '<div class="clf-card">' +
      '<div class="clf-header" style="border-left:4px solid ' + cl.color + '">' +
        '<div class="clf-icon" style="background:' + cl.bg + ';color:' + cl.color + '">' + cl.char + '</div>' +
        '<div>' +
          '<div class="clf-char cn">' + cl.char + ' <span style="font-size:13px;color:var(--orange)">' + cl.py + '</span></div>' +
          '<div class="clf-py">' + cl.desc + '</div>' +
          '<div class="clf-rule">' + cl.rule + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="clf-nouns">' +
        cl.nouns.map(function(n) {
          return '<span class="clf-noun" style="background:' + cl.bg + ';border:1.5px solid ' + cl.color + '40">' +
            '<span class="clf-noun-emoji">' + n.e + '</span>' +
            '<span class="clf-noun-cn cn">' + n.c + '</span>' +
            '<span class="clf-noun-es">' + n.es + '</span>' +
          '</span>';
        }).join('') +
      '</div>' +
    '</div>';
  }).join('');
}

function renderCLBuild() {
  clbSents = shuffle(buildSents); clbIdx = 0; clbOk = 0; clbBad = 0;
  clbShowSent();
}

function clbShowSent() {
  if (clbIdx >= clbSents.length) {
    el('game-body').innerHTML = showResults(clbOk, clbSents.length, 'classifier');
    return;
  }
  clbSel = [];
  var s = clbSents[clbIdx];
  var shuffled = shuffle(s.pieces.slice());
  el('game-body').innerHTML =
    '<div class="scores">' + scoreBox(clbOk,'Correctas','var(--green)') + scoreBox(clbBad,'Errores','var(--red)') + '</div>' +
    '<div class="build-box">' +
      '<div class="build-target">' + s.es + '</div>' +
      '<div class="drop-zone" id="clb-drop"><span class="drop-hint" id="clb-hint">Toca las piezas para añadirlas</span></div>' +
      '<div class="piece-zone" id="clb-pieces">' +
        shuffled.map(function(p,i) {
          return '<div class="piece" data-i="' + i + '" data-p="' + p.replace(/"/g,'&quot;') + '" onclick="clbAdd(this)">' + p + '</div>';
        }).join('') +
      '</div>' +
    '</div>' +
    '<div style="display:flex;gap:10px;justify-content:center;margin-bottom:10px">' +
      '<button class="btn btn-outline" onclick="clbReset()">↺ Reiniciar</button>' +
      '<button class="btn btn-primary" onclick="clbCheck()">Comprobar ✓</button>' +
    '</div>' +
    '<div id="clb-fb" style="display:none;margin-bottom:10px"></div>' +
    '<button class="next-btn" id="clb-next" onclick="clbNext()">Siguiente →</button>';
}

function clbAdd(div) {
  if (div.classList.contains('used')) return;
  div.classList.add('used');
  var p = div.dataset.p;
  clbSel.push({p:p, src:div});
  clbRenderDrop();
}

function clbRenderDrop() {
  var dz = el('clb-drop');
  dz.classList.toggle('has-items', clbSel.length > 0);
  if (!clbSel.length) { dz.innerHTML = '<span class="drop-hint">Toca las piezas para añadirlas</span>'; return; }
  dz.innerHTML = clbSel.map(function(item,i) {
    return '<div class="drop-piece" onclick="clbRemove(' + i + ')">' + item.p + '</div>';
  }).join('');
}

function clbRemove(i) {
  var item = clbSel.splice(i, 1)[0];
  item.src.classList.remove('used');
  clbRenderDrop();
}

function clbReset() {
  clbSel = [];
  document.querySelectorAll('.piece').forEach(function(d){d.classList.remove('used');});
  clbRenderDrop();
  el('clb-fb').style.display = 'none';
  var nb = el('clb-next'); if(nb) nb.classList.remove('show');
}

function clbCheck() {
  var s = clbSents[clbIdx];
  var user = clbSel.map(function(x){return x.p;});
  var ok = JSON.stringify(user) === JSON.stringify(s.ok);
  var fb = el('clb-fb');
  fb.style.display = '';
  if (ok) {
    clbOk++;
    fb.innerHTML = '<div style="background:var(--green-light);border:1.5px solid var(--green);border-radius:var(--r-sm);padding:12px 16px;color:var(--green);font-weight:700">✅ ¡Correcto! <span style="font-size:12px;font-weight:500;color:var(--ink3)">' + s.hint + '</span></div>';
  } else {
    clbBad++;
    fb.innerHTML = '<div style="background:var(--red-light);border:1.5px solid var(--red);border-radius:var(--r-sm);padding:12px 16px;color:var(--red);font-weight:700">❌ Correcto: <span class="cn" style="font-size:18px;color:var(--ink)">' + s.ok.join('') + '</span><div style="font-size:12px;color:var(--ink3);margin-top:4px">' + s.py + ' · ' + s.hint + '</div></div>';
  }
  clbIdx++;
  var nb = el('clb-next'); if(nb) nb.classList.add('show');
}

function clbNext() { clbShowSent(); }

document.addEventListener('DOMContentLoaded', function() {
  initHome();
  renderGrammarRef();
  showScreen('home');
});
